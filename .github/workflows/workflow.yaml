name: ML Pipeline

on:
  push:
  workflow_dispatch:

jobs:
  linter:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      
      - name: Install flake8
        run: pip install flake8
      
      - name: Run linter
        run: flake8 .

  train:
    needs: linter
    if: github.ref == 'refs/heads/main' && contains(github.event.head_commit.message, '[run-train]')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: pip install -r requirements.txt || pip install scikit-learn mlflow dvc

      - name: Pull data with DVC
        continue-on-error: true
        run: dvc pull || echo "No DVC remote configured"

      - name: Train model
        run: |
          python train.py 2>&1 | tee error_logs.txt
        env:
          FLIP_Y: "0.5"

      - name: Show output files
        run: |
          cat model_info.txt
          cat accuracy.txt

      - name: Upload model info
        uses: actions/upload-artifact@v4
        with:
          name: model-info
          path: model_info.txt

      - name: Upload accuracy
        uses: actions/upload-artifact@v4
        with:
          name: accuracy-info
          path: accuracy.txt

      - name: Upload error logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: error-logs
          path: error_logs.txt

      - name: Cleanup Volumes
        if: always()
        run: echo "Cleaning up temporary cloud volumes..."

  deploy:
    runs-on: ubuntu-latest
    needs: train
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download model info
        uses: actions/download-artifact@v4
        with:
          name: model-info

      - name: Download accuracy
        uses: actions/download-artifact@v4
        with:
          name: accuracy-info

      - name: Show downloaded files
        run: |
          ls -la
          cat model_info.txt
          cat accuracy.txt

      - name: Check accuracy threshold
        run: python check_threshold.py

      - name: Mock Docker Build
        run: echo "Building Docker image for Run ID:$(cat model_info.txt)"
