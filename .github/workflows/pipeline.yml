name: ML Pipeline

on:
  push:
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: pip install scikit-learn mlflow dvc

      - name: Pull data with DVC
        continue-on-error: true
        run: dvc pull || echo "No DVC remote configured, skipping"

      - name: Train model
        run: python train.py
        env:
          MLFLOW_TRACKING_URI: ./mlruns
          FLIP_Y: "0.01"

      - name: Upload model info
        uses: actions/upload-artifact@v4
        with:
          name: model-info
          path: model_info.txt

      - name: Upload MLflow data
        uses: actions/upload-artifact@v4
        with:
          name: mlflow-data
          path: mlruns/

  deploy:
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: pip install scikit-learn mlflow

      - name: Download model info
        uses: actions/download-artifact@v4
        with:
          name: model-info

      - name: Download MLflow data
        uses: actions/download-artifact@v4
        with:
          name: mlflow-data
          path: mlruns/

      - name: Check accuracy threshold
        run: python check_threshold.py
        env:
          MLFLOW_TRACKING_URI: ./mlruns

      - name: Mock Docker Build
        run: echo "Building Docker image for Run ID $(cat model_info.txt)"
